<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <main class="mx-auto max-w-6xl px-4 py-8">
      <h1 id="app-title" class="mb-6 text-center text-3xl font-bold">Sales Tracker Web App</h1>

      <section class="mb-6 rounded-xl bg-white p-6 shadow-md">
        <h2 class="mb-4 text-xl font-semibold">Add Sale</h2>
        <form id="sales-form" class="grid gap-4 md:grid-cols-2">
          <label class="text-sm font-medium">Customer Name
            <input id="customerName" type="text" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500" placeholder="John Smith" />
          </label>
          <label class="text-sm font-medium">Product Type
            <input id="productType" type="text" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500" placeholder="Laptop" />
          </label>
          <label class="text-sm font-medium">Quantity
            <input id="quantity" type="number" min="1" step="1" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500" placeholder="1" />
          </label>
          <label class="text-sm font-medium">Total Price
            <input id="totalPrice" type="number" min="0.01" step="0.01" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500" placeholder="1200.00" />
          </label>
          <label class="text-sm font-medium md:col-span-2">Sale Date
            <input id="saleDate" type="date" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500" />
          </label>
          <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 font-semibold text-white transition hover:bg-blue-700 md:col-span-2">Save Sale</button>
        </form>
      </section>

      <section class="mb-6 rounded-xl bg-white p-6 shadow-md">
        <h2 class="mb-4 text-xl font-semibold">Filters</h2>
        <div class="grid gap-4 md:grid-cols-3">
          <label class="text-sm font-medium">Day
            <input id="dayFilter" type="date" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500" />
          </label>
          <label class="text-sm font-medium">Month
            <select id="monthFilter" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500">
              <option value="">All Months</option>
            </select>
          </label>
          <label class="text-sm font-medium">Year
            <select id="yearFilter" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none ring-2 ring-transparent transition focus:ring-blue-500">
              <option value="">All Years</option>
            </select>
          </label>
        </div>
      </section>

      <section class="mb-6 rounded-xl bg-white p-6 shadow-md">
        <h2 class="mb-4 text-xl font-semibold">Sales Records</h2>
        <div class="overflow-x-auto">
          <table class="min-w-full border-collapse text-sm">
            <thead>
              <tr class="bg-slate-100">
                <th class="border border-slate-200 px-3 py-2 text-left">Date</th>
                <th class="border border-slate-200 px-3 py-2 text-left">Customer</th>
                <th class="border border-slate-200 px-3 py-2 text-left">Product</th>
                <th class="border border-slate-200 px-3 py-2 text-right">Qty</th>
                <th class="border border-slate-200 px-3 py-2 text-right">Total Price</th>
              </tr>
            </thead>
            <tbody id="salesTableBody"></tbody>
          </table>
        </div>
        <p id="emptyState" class="mt-3 hidden text-slate-500">No sales records for the selected filters.</p>
      </section>

      <section class="mb-6 rounded-xl bg-white p-6 shadow-md">
        <h2 class="mb-4 text-xl font-semibold">Totals</h2>
        <div class="grid gap-3 md:grid-cols-2">
          <div class="rounded-lg bg-slate-100 p-4">
            <p class="text-sm font-medium text-slate-600">Monthly Total</p>
            <p id="monthlyTotal" class="text-2xl font-bold">$0.00</p>
          </div>
          <div class="rounded-lg bg-slate-100 p-4">
            <p class="text-sm font-medium text-slate-600">Yearly Total</p>
            <p id="yearlyTotal" class="text-2xl font-bold">$0.00</p>
          </div>
        </div>
      </section>

      <section class="rounded-xl bg-white p-6 shadow-md">
        <h2 class="mb-4 text-xl font-semibold">Theme Settings</h2>
        <div class="grid gap-4 md:grid-cols-3">
          <label class="text-sm font-medium">Headline Color
            <input id="headlineColor" type="color" class="mt-1 h-10 w-full cursor-pointer rounded-lg border border-slate-300 p-1" />
          </label>
          <label class="text-sm font-medium">Font Color
            <input id="fontColor" type="color" class="mt-1 h-10 w-full cursor-pointer rounded-lg border border-slate-300 p-1" />
          </label>
          <label class="text-sm font-medium">Background Color
            <input id="backgroundColor" type="color" class="mt-1 h-10 w-full cursor-pointer rounded-lg border border-slate-300 p-1" />
          </label>
        </div>
      </section>
    </main>

    <script>
      const SALES_KEY = "sales-tracker-records";
      const THEME_KEY = "sales-tracker-theme";

      const salesForm = document.getElementById("sales-form");
      const customerNameInput = document.getElementById("customerName");
      const productTypeInput = document.getElementById("productType");
      const quantityInput = document.getElementById("quantity");
      const totalPriceInput = document.getElementById("totalPrice");
      const saleDateInput = document.getElementById("saleDate");

      const dayFilterInput = document.getElementById("dayFilter");
      const monthFilterInput = document.getElementById("monthFilter");
      const yearFilterInput = document.getElementById("yearFilter");

      const salesTableBody = document.getElementById("salesTableBody");
      const emptyState = document.getElementById("emptyState");
      const monthlyTotalElement = document.getElementById("monthlyTotal");
      const yearlyTotalElement = document.getElementById("yearlyTotal");

      const appTitle = document.getElementById("app-title");
      const headlineColorInput = document.getElementById("headlineColor");
      const fontColorInput = document.getElementById("fontColor");
      const backgroundColorInput = document.getElementById("backgroundColor");

      const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD"
        }).format(value);
      }

      function readSales() {
        const raw = localStorage.getItem(SALES_KEY);
        if (!raw) return [];
        return JSON.parse(raw);
      }

      function saveSales(sales) {
        localStorage.setItem(SALES_KEY, JSON.stringify(sales));
      }

      function readTheme() {
        const raw = localStorage.getItem(THEME_KEY);
        if (!raw) {
          return {
            headlineColor: "#0f172a",
            fontColor: "#1e293b",
            backgroundColor: "#f1f5f9"
          };
        }
        return JSON.parse(raw);
      }

      function saveTheme(theme) {
        localStorage.setItem(THEME_KEY, JSON.stringify(theme));
      }

      function populateFilters(sales) {
        const years = [...new Set(sales.map((sale) => new Date(sale.date).getFullYear()))].sort((a, b) => a - b);

        monthFilterInput.innerHTML = '<option value="">All Months</option>';
        monthNames.forEach((month, index) => {
          const option = document.createElement("option");
          option.value = String(index + 1);
          option.textContent = month;
          monthFilterInput.appendChild(option);
        });

        yearFilterInput.innerHTML = '<option value="">All Years</option>';
        years.forEach((year) => {
          const option = document.createElement("option");
          option.value = String(year);
          option.textContent = String(year);
          yearFilterInput.appendChild(option);
        });
      }

      function getFilteredSales() {
        const sales = readSales();
        const selectedDay = dayFilterInput.value;
        const selectedMonth = monthFilterInput.value;
        const selectedYear = yearFilterInput.value;

        return sales.filter((sale) => {
          const saleDate = new Date(sale.date);
          const matchDay = selectedDay ? sale.date === selectedDay : true;
          const matchMonth = selectedMonth ? saleDate.getMonth() + 1 === Number(selectedMonth) : true;
          const matchYear = selectedYear ? saleDate.getFullYear() === Number(selectedYear) : true;
          return matchDay && matchMonth && matchYear;
        });
      }

      function calculateTotals(sales) {
        const today = new Date();
        const selectedMonth = monthFilterInput.value ? Number(monthFilterInput.value) : today.getMonth() + 1;
        const selectedYear = yearFilterInput.value ? Number(yearFilterInput.value) : today.getFullYear();

        const monthlyTotal = sales
          .filter((sale) => {
            const saleDate = new Date(sale.date);
            return saleDate.getMonth() + 1 === selectedMonth && saleDate.getFullYear() === selectedYear;
          })
          .reduce((sum, sale) => sum + sale.totalPrice, 0);

        const yearlyTotal = sales
          .filter((sale) => new Date(sale.date).getFullYear() === selectedYear)
          .reduce((sum, sale) => sum + sale.totalPrice, 0);

        monthlyTotalElement.textContent = formatCurrency(monthlyTotal);
        yearlyTotalElement.textContent = formatCurrency(yearlyTotal);
      }

      function renderSalesTable() {
        const filteredSales = getFilteredSales().sort((a, b) => new Date(b.date) - new Date(a.date));
        salesTableBody.innerHTML = "";

        if (filteredSales.length === 0) {
          emptyState.classList.remove("hidden");
        } else {
          emptyState.classList.add("hidden");
        }

        filteredSales.forEach((sale) => {
          const row = document.createElement("tr");
          row.className = "odd:bg-white even:bg-slate-50";

          row.innerHTML = `
            <td class="border border-slate-200 px-3 py-2">${sale.date}</td>
            <td class="border border-slate-200 px-3 py-2">${sale.customerName}</td>
            <td class="border border-slate-200 px-3 py-2">${sale.productType}</td>
            <td class="border border-slate-200 px-3 py-2 text-right">${sale.quantity}</td>
            <td class="border border-slate-200 px-3 py-2 text-right">${formatCurrency(sale.totalPrice)}</td>
          `;
          salesTableBody.appendChild(row);
        });

        calculateTotals(readSales());
      }

      function applyTheme(theme) {
        appTitle.style.color = theme.headlineColor;
        document.body.style.color = theme.fontColor;
        document.body.style.backgroundColor = theme.backgroundColor;

        headlineColorInput.value = theme.headlineColor;
        fontColorInput.value = theme.fontColor;
        backgroundColorInput.value = theme.backgroundColor;
      }

      function setDefaultDate() {
        const today = new Date().toISOString().split("T")[0];
        saleDateInput.value = today;
      }

      salesForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const customerName = customerNameInput.value.trim();
        const productType = productTypeInput.value.trim();
        const quantity = Number(quantityInput.value);
        const totalPrice = Number(totalPriceInput.value);
        const saleDate = saleDateInput.value;

        if (!customerName || !productType || !saleDate || quantity <= 0 || totalPrice <= 0) {
          return;
        }

        const sales = readSales();
        sales.push({
          id: crypto.randomUUID(),
          customerName,
          productType,
          quantity,
          totalPrice,
          date: saleDate
        });

        saveSales(sales);
        salesForm.reset();
        setDefaultDate();
        populateFilters(sales);
        renderSalesTable();
      });

      [dayFilterInput, monthFilterInput, yearFilterInput].forEach((filter) => {
        filter.addEventListener("change", renderSalesTable);
      });

      [headlineColorInput, fontColorInput, backgroundColorInput].forEach((input) => {
        input.addEventListener("input", () => {
          const theme = {
            headlineColor: headlineColorInput.value,
            fontColor: fontColorInput.value,
            backgroundColor: backgroundColorInput.value
          };
          applyTheme(theme);
          saveTheme(theme);
        });
      });

      const existingSales = readSales();
      setDefaultDate();
      populateFilters(existingSales);
      applyTheme(readTheme());
      renderSalesTable();
    </script>
  </body>
</html>
